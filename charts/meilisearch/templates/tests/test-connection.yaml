apiVersion: v1
kind: Pod
metadata:
  name: {{ include "meilisearch.fullname" . | lower }}-test-connection
  labels:
    app.kubernetes.io/name: {{ include "meilisearch.name" . }}
    helm.sh/chart: {{ include "meilisearch.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": test-success
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:
        - '--spider'
        - '--timeout=5'
        {{- if .Values.tls.enabled }}
        - '--no-check-certificate'
        - 'https://{{ include "meilisearch.fullname" . }}:{{ .Values.service.port }}'
        {{- else }}
        - '{{ include "meilisearch.fullname" . }}:{{ .Values.service.port }}'
        {{- end }}
  restartPolicy: Never
